<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ResumeForge – Build Your Resume</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .save-draft-btn {
      padding: 10px 22px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .save-draft-btn:hover {
      background: #45a049;
    }
    .history-btn {
      padding: 10px 22px;
      background: #2196F3;
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .history-btn:hover {
      background: #0b7dda;
    }
    .logout-btn {
      padding: 10px 22px;
      background: #f44336;
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .logout-btn:hover {
      background: #da190b;
    }
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0, 0, 0, 0.4);
    }
    .modal-content {
      background-color: #fefefe;
      margin: 10% auto;
      padding: 30px;
      border-radius: 12px;
      width: 80%;
      max-width: 600px;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }
    .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }
    .close:hover {
      color: #000;
    }
    .draft-item {
      background: #f7f5f0;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      border-left: 4px solid #c8a96e;
    }
    .draft-item h4 {
      margin: 0 0 8px 0;
      color: #1a1a2e;
    }
    .draft-item p {
      margin: 0 0 12px 0;
      color: #8a8a9a;
      font-size: 0.9rem;
    }
    .draft-item button {
      padding: 8px 15px;
      margin-right: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .load-draft-btn {
      background: #2196F3;
      color: white;
    }
    .delete-draft-btn {
      background: #f44336;
      color: white;
    }
    .action-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* ===== MOBILE PANEL TOGGLE ===== */
    .mobile-toggle {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 999;
      background: #c8a96e;
      color: white;
      border: none;
      border-radius: 50px;
      padding: 12px 22px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25);
      transition: all 0.2s;
    }
    .mobile-toggle:hover {
      background: #b5933a;
      transform: scale(1.05);
    }

    /* ===== RESPONSIVE BREAKPOINTS ===== */

    /* Tablet: 641px – 1024px */
    @media (max-width: 1024px) {
      header {
        flex-wrap: wrap;
        gap: 10px;
        padding: 12px 16px;
      }
      .header-actions {
        flex-wrap: wrap;
        gap: 8px;
      }
      .template-tabs {
        order: -1;
        width: 100%;
      }
      .download-btn,
      .save-draft-btn,
      .history-btn,
      .logout-btn {
        padding: 8px 14px;
        font-size: 0.82rem;
      }
      .app {
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        padding: 16px;
      }
    }

    /* Mobile: ≤ 640px */
    @media (max-width: 640px) {
      /* --- HEADER --- */
      header {
        flex-direction: column;
        align-items: flex-start;
        padding: 10px 14px;
        gap: 8px;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .logo {
        font-size: 1.3rem !important;
      }
      .header-actions {
        width: 100%;
        flex-wrap: wrap;
        gap: 6px;
      }
      .template-tabs {
        width: 100%;
        display: flex;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        gap: 6px;
      }
      .template-tabs::-webkit-scrollbar { display: none; }
      .tab-btn {
        white-space: nowrap;
        flex-shrink: 0;
        padding: 6px 14px !important;
        font-size: 0.8rem !important;
      }
      .download-btn,
      .save-draft-btn,
      .history-btn,
      .logout-btn {
        padding: 7px 12px;
        font-size: 0.78rem;
        border-radius: 6px;
        flex: 1 1 calc(50% - 6px);
        text-align: center;
      }

      /* --- APP LAYOUT: stacked panels --- */
      .app {
        display: flex !important;
        flex-direction: column;
        padding: 12px;
        gap: 0;
      }
      .form-panel,
      .preview-panel {
        width: 100%;
        box-sizing: border-box;
      }
      /* Hide preview by default on mobile; toggled via JS */
      .preview-panel {
        display: none;
      }
      .preview-panel.mobile-visible {
        display: block;
      }
      .form-panel.mobile-hidden {
        display: none;
      }

      /* --- FORM SECTIONS --- */
      .form-row {
        flex-direction: column !important;
        gap: 10px;
      }
      .form-group {
        width: 100% !important;
      }
      .photo-upload {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 10px;
      }
      .section-title {
        font-size: 1rem !important;
      }

      /* --- RESUME PREVIEW --- */
      #resumePreview {
        transform: scale(0.55);
        transform-origin: top left;
        width: 182% !important;
        margin-bottom: -45% !important;
      }

      /* --- SKILL INPUT ROW --- */
      .skill-input-row {
        flex-direction: column !important;
        gap: 8px;
      }
      .skill-input-row input,
      .skill-input-row button {
        width: 100% !important;
        box-sizing: border-box;
      }

      /* --- MODALS --- */
      .modal-content {
        width: 94% !important;
        margin: 5% auto !important;
        padding: 20px !important;
        max-height: 90vh !important;
      }

      /* --- MOBILE TOGGLE BUTTON --- */
      .mobile-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      /* --- DRAFT ITEM BUTTONS --- */
      .draft-item button,
      .draft-item a {
        flex: 1 1 calc(50% - 5px);
        text-align: center;
      }
    }

    /* Very small phones */
    @media (max-width: 375px) {
      .download-btn,
      .save-draft-btn,
      .history-btn,
      .logout-btn {
        flex: 1 1 100%;
      }
      #resumePreview {
        transform: scale(0.48);
        width: 208% !important;
        margin-bottom: -52% !important;
      }
    }
  </style>
</head>
<body data-require-auth="true">

  <!-- ===== HEADER ===== -->
  <header>
    <div class="logo">Resume<span>Forge</span></div>
    <div class="header-actions">
      <div class="template-tabs">
        <button class="tab-btn active" onclick="setTemplate('classic')">Classic</button>
        <button class="tab-btn" onclick="setTemplate('modern')">Modern</button>
        <button class="tab-btn" onclick="setTemplate('minimal')">Minimal</button>
      </div>
      <button class="download-btn" onclick="downloadPDF()">⬇ Download PDF</button>
      <button class="download-btn" onclick="markAsComplete()">✅ Complete Resume</button>
      <button class="save-draft-btn" onclick="openSaveDraftModal()">💾 Save Draft</button>
      <button class="history-btn" onclick="openHistoryModal()">📋 History</button>
      <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    </div>
  </header>

  <!-- ===== MAIN APP ===== -->
  <div class="app">

    <!-- FORM PANEL -->
    <div class="form-panel">

      <!-- Photo Upload -->
      <div class="form-section">
        <div class="section-title"><span class="icon">📷</span> Profile Photo</div>
        <div class="photo-upload" onclick="document.getElementById('photoInput').click()">
          <img id="photoPreview" class="photo-preview" src="" alt="Photo"/>
          <div class="photo-placeholder" id="photoPlaceholder">🧑</div>
          <div class="photo-text">
            <strong>Upload your photo</strong>
            Click to browse or drag & drop
          </div>
        </div>
        <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhoto(event)"/>
      </div>

      <!-- Personal Information -->
      <div class="form-section">
        <div class="section-title"><span class="icon">👤</span> Personal Information</div>
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" id="firstName" placeholder="John" oninput="update()"/>
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" id="lastName" placeholder="Doe" oninput="update()"/>
          </div>
        </div>
        <div class="form-group">
          <label>Job Title / Role</label>
          <input type="text" id="jobTitle" placeholder="Software Engineer" oninput="update()"/>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="john@email.com" oninput="update()"/>
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="tel" id="phone" placeholder="+91 9876543210" oninput="update()"/>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Location</label>
            <input type="text" id="location" placeholder="Mumbai, India" oninput="update()"/>
          </div>
          <div class="form-group">
            <label>LinkedIn / Website</label>
            <input type="text" id="linkedin" placeholder="linkedin.com/in/johndoe" oninput="update()"/>
          </div>
        </div>
        <div class="form-group">
          <label>Professional Summary</label>
          <textarea id="summary" placeholder="Write a brief summary about yourself..." oninput="update()"></textarea>
        </div>
      </div>

      <!-- Work Experience -->
      <div class="form-section">
        <div class="section-title"><span class="icon">💼</span> Work Experience</div>
        <div id="experience-list"></div>
        <button class="add-btn" onclick="addEntry('experience')">+ Add Experience</button>
      </div>

      <!-- Education -->
      <div class="form-section">
        <div class="section-title"><span class="icon">🎓</span> Education</div>
        <div id="education-list"></div>
        <button class="add-btn" onclick="addEntry('education')">+ Add Education</button>
      </div>

      <!-- Projects -->
      <div class="form-section">
        <div class="section-title"><span class="icon">🚀</span> Projects</div>
        <div id="projects-list"></div>
        <button class="add-btn" onclick="addEntry('projects')">+ Add Project</button>
      </div>

      <!-- Skills -->
      <div class="form-section">
        <div class="section-title"><span class="icon">⚡</span> Skills</div>
        <div class="skills-container" id="skills-list"></div>
        <div class="skill-input-row">
          <input type="text" id="skillInput" placeholder="e.g. JavaScript" onkeydown="if(event.key==='Enter') addSkill()"/>
          <button onclick="addSkill()">Add</button>
        </div>
      </div>

      <!-- Certifications -->
      <div class="form-section">
        <div class="section-title"><span class="icon">🏆</span> Certifications</div>
        <div id="certifications-list"></div>
        <button class="add-btn" onclick="addEntry('certifications')">+ Add Certification</button>
      </div>

    </div>
    <!-- END FORM PANEL -->

    <!-- PREVIEW PANEL -->
    <div class="preview-panel">
      <div class="resume classic" id="resumePreview">
        <!-- Rendered dynamically by script.js -->
      </div>
    </div>

  </div>
  <!-- END APP -->

  <!-- Mobile Panel Toggle Button -->
  <button class="mobile-toggle" id="mobilePanelToggle" onclick="toggleMobilePanel()">
    👁 Preview
  </button>

  <!-- Save Draft Modal -->
  <div id="saveDraftModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeSaveDraftModal()">&times;</span>
      <h2>Save Draft</h2>
      <div style="margin: 20px 0;">
        <label for="draftName">Draft Name (optional):</label>
        <input type="text" id="draftName" placeholder="My Resume Draft" style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px;">
        <button onclick="saveDraft()" style="width: 100%; padding: 10px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: 600;">Save</button>
      </div>
    </div>
  </div>

  <!-- History Modal -->
  <div id="historyModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeHistoryModal()">&times;</span>
      <h2>Resume History & Drafts</h2>
      <div id="historyContent" style="margin-top: 20px;"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/script.js"></script>
  
  <script>

    async function markAsComplete() {
  try {
    const resumeData = getResumeData();

    await StorageManager.saveToHistory(
      resumeData,
      null, // no PDF for now
      currentTemplate
    );

    alert("✅ Resume marked as completed!");
  } catch (error) {
    alert("❌ Error: " + error.message);
  }
}

    async function logout() {
      if (confirm('Are you sure you want to logout?')) {
        await AuthManager.logout();
      }
    }

    function openSaveDraftModal() {
      document.getElementById('saveDraftModal').style.display = 'block';
    }

    function closeSaveDraftModal() {
      document.getElementById('saveDraftModal').style.display = 'none';
      document.getElementById('draftName').value = '';
    }

    async function saveDraft() {
      const draftName = document.getElementById('draftName').value || null;
      const resumeData = getResumeData();

      try {
        await StorageManager.saveDraft(resumeData, draftName);
        alert('✅ Draft saved successfully!');
        closeSaveDraftModal();
      } catch (error) {
        alert('❌ Error saving draft: ' + error.message);
      }
    }

    function openHistoryModal() {
      document.getElementById('historyModal').style.display = 'block';
      loadHistory();
    }

    function closeHistoryModal() {
      document.getElementById('historyModal').style.display = 'none';
    }

    async function loadHistory() {
      try {
        const drafts = await StorageManager.getDrafts();
        const history = await StorageManager.getHistory();

        let content = '<h3>Saved Drafts</h3>';
        if (drafts.length === 0) {
          content += '<p style="color: #8a8a9a;">No saved drafts yet.</p>';
        } else {
          drafts.forEach((draft) => {
            const date = new Date(draft.updated_at).toLocaleString();
            content += `
              <div class="draft-item">
                <h4>${draft.name}</h4>
                <p>Last updated: ${date}</p>
                <div class="action-buttons">
                  <button class="load-draft-btn" onclick="loadDraft('${draft.id}')">Load</button>
                  <button class="delete-draft-btn" onclick="deleteDraft('${draft.id}')">Delete</button>
                </div>
              </div>
            `;
          });
        }

        content += '<hr style="margin: 30px 0;"><h3>Resume History</h3>';
        if (history.length === 0) {
          content += '<p style="color: #8a8a9a;">No completed resumes yet.</p>';
        } else {
          history.forEach((item) => {
            const date = new Date(item.created_at).toLocaleString();
            content += `
              <div class="draft-item">
                <h4>${item.name} (${item.template})</h4>
                <p>Created: ${date}</p>
                <div class="action-buttons">
                  <button class="load-draft-btn" onclick="loadHistoryItem('${item.id}')">Load</button>
                  ${item.pdf_url ? `<a href="${item.pdf_url}" target="_blank" style="padding: 8px 15px; background: #FF9800; color: white; text-decoration: none; border-radius: 5px; display: inline-block;">Download PDF</a>` : ''}
                  <button class="delete-draft-btn" onclick="deleteHistory('${item.id}')">Delete</button>
                </div>
              </div>
            `;
          });
        }

        document.getElementById('historyContent').innerHTML = content;
      } catch (error) {
        alert('Error loading history: ' + error.message);
      }
    }

    async function loadDraft(draftId) {
      try {
        const draft = await StorageManager.getDraft(draftId);
        if (draft) {
          loadResumeData(draft.content);
          closeHistoryModal();
          alert('✅ Draft loaded!');
        }
      } catch (error) {
        alert('Error loading draft: ' + error.message);
      }
    }

    async function deleteDraft(draftId) {
      if (confirm('Are you sure you want to delete this draft?')) {
        try {
          await StorageManager.deleteDraft(draftId);
          loadHistory();
          alert('✅ Draft deleted!');
        } catch (error) {
          alert('Error deleting draft: ' + error.message);
        }
      }
    }

    async function loadHistoryItem(historyId) {
      try {
        const items = await StorageManager.getHistory();
        const item = items.find(h => h.id === historyId);
        if (item) {
          loadResumeData(item.content);
          setTemplate(item.template);
          closeHistoryModal();
          alert('✅ History item loaded!');
        }
      } catch (error) {
        alert('Error loading history item: ' + error.message);
      }
    }

    async function deleteHistory(historyId) {
      if (confirm('Are you sure you want to delete this resume from history?')) {
        try {
          await StorageManager.deleteHistory(historyId);
          loadHistory();
          alert('✅ History entry deleted!');
        } catch (error) {
          alert('Error deleting history: ' + error.message);
        }
      }
    }

    function getResumeData() {
      return {
        personal: {
          firstName: document.getElementById('firstName').value,
          lastName: document.getElementById('lastName').value,
          jobTitle: document.getElementById('jobTitle').value,
          email: document.getElementById('email').value,
          phone: document.getElementById('phone').value,
          location: document.getElementById('location').value,
          linkedin: document.getElementById('linkedin').value,
          summary: document.getElementById('summary').value,
          photo: document.getElementById('photoPreview').src,
        },
        experience: data.experience || [],
        education: data.education || [],
        projects: data.projects || [],
        skills: skills || [],
        certifications: data.certifications || [],
      };
    }
function loadResumeData(resume) {
  if (!resume) return;

  // -------- RESET STATE FIRST --------
  data.experience = [];
  data.education = [];
  data.projects = [];
  data.certifications = [];
  skills = [];

  // -------- CLEAR UI --------
  document.getElementById('experience-list').innerHTML = '';
  document.getElementById('education-list').innerHTML = '';
  document.getElementById('projects-list').innerHTML = '';
  document.getElementById('certifications-list').innerHTML = '';
  document.getElementById('skills-list').innerHTML = '';

  // -------- RESET COUNTERS --------
  counters = {
    experience: 0,
    education: 0,
    projects: 0,
    certifications: 0
  };

  // -------- LOAD PERSONAL --------
  document.getElementById('firstName').value = resume.personal?.firstName || '';
  document.getElementById('lastName').value = resume.personal?.lastName || '';
  document.getElementById('jobTitle').value = resume.personal?.jobTitle || '';
  document.getElementById('email').value = resume.personal?.email || '';
  document.getElementById('phone').value = resume.personal?.phone || '';
  document.getElementById('location').value = resume.personal?.location || '';
  document.getElementById('linkedin').value = resume.personal?.linkedin || '';
  document.getElementById('summary').value = resume.personal?.summary || '';

  // -------- PHOTO --------
  if (resume.personal?.photo) {
    document.getElementById('photoPreview').src = resume.personal.photo;
    document.getElementById('photoPlaceholder').style.display = 'none';
    document.getElementById('photoPreview').style.display = 'block';
  }

  // -------- LOAD EXPERIENCE --------
  (resume.experience || []).forEach(exp => {
    addEntry('experience');

    const last = data.experience[data.experience.length - 1];
    Object.assign(last, exp);

    const card = document.getElementById(`card_${last.id}`);
    const inputs = card.querySelectorAll('input, textarea');

    if (inputs[0]) inputs[0].value = exp.title || '';
    if (inputs[1]) inputs[1].value = exp.subtitle || '';
    if (inputs[2]) inputs[2].value = exp.start || '';
    if (inputs[3]) inputs[3].value = exp.end || '';
    if (inputs[4]) inputs[4].value = exp.desc || '';
  });

  // -------- LOAD EDUCATION --------
  (resume.education || []).forEach(edu => {
    addEntry('education');

    const last = data.education[data.education.length - 1];
    Object.assign(last, edu);

    const card = document.getElementById(`card_${last.id}`);
    const inputs = card.querySelectorAll('input');

    if (inputs[0]) inputs[0].value = edu.title || '';
    if (inputs[1]) inputs[1].value = edu.subtitle || '';
    if (inputs[2]) inputs[2].value = edu.start || '';
    if (inputs[3]) inputs[3].value = edu.end || '';
    if (inputs[4]) inputs[4].value = edu.desc || '';
  });

  // -------- LOAD PROJECTS --------
  (resume.projects || []).forEach(proj => {
    addEntry('projects');

    const last = data.projects[data.projects.length - 1];
    Object.assign(last, proj);

    const card = document.getElementById(`card_${last.id}`);
    const inputs = card.querySelectorAll('input, textarea');

    if (inputs[0]) inputs[0].value = proj.title || '';
    if (inputs[1]) inputs[1].value = proj.subtitle || '';
    if (inputs[2]) inputs[2].value = proj.start || '';
    if (inputs[3]) inputs[3].value = proj.desc || '';
  });

  // -------- LOAD CERTIFICATIONS --------
  (resume.certifications || []).forEach(cert => {
    addEntry('certifications');

    const last = data.certifications[data.certifications.length - 1];
    Object.assign(last, cert);

    const card = document.getElementById(`card_${last.id}`);
    const inputs = card.querySelectorAll('input');

    if (inputs[0]) inputs[0].value = cert.title || '';
    if (inputs[1]) inputs[1].value = cert.subtitle || '';
    if (inputs[2]) inputs[2].value = cert.start || '';
  });

  // -------- LOAD SKILLS --------
  skills = resume.skills || [];
  renderSkillChips();

  // -------- FINAL UPDATE --------
  update();
}

    window.addEventListener('click', (event) => {
      const saveDraftModal = document.getElementById('saveDraftModal');
      const historyModal = document.getElementById('historyModal');
      
      if (event.target === saveDraftModal) {
        closeSaveDraftModal();
      }
      if (event.target === historyModal) {
        closeHistoryModal();
      }
    });

    /* ===== MOBILE PANEL TOGGLE ===== */
    let showingPreview = false;
    function toggleMobilePanel() {
      showingPreview = !showingPreview;
      const form = document.querySelector('.form-panel');
      const preview = document.querySelector('.preview-panel');
      const btn = document.getElementById('mobilePanelToggle');

      if (showingPreview) {
        form.classList.add('mobile-hidden');
        preview.classList.add('mobile-visible');
        btn.textContent = '✏️ Edit';
      } else {
        form.classList.remove('mobile-hidden');
        preview.classList.remove('mobile-visible');
        btn.textContent = '👁 Preview';
      }
    }
  </script>
</body>
</html>
